# Continuous integration: build + test on every push and pull request.
#
# This gates the checks that run WITHOUT the reference Ruby implementation —
# `cargo build` and `cargo test`. The differential parity harnesses
# (`harness/run.rb`, `harness/run_corpus.rb`) need the reference checkout and
# real corpora and so stay a LOCAL pre-merge gate, not a CI job.
#
# rustfmt is intentionally not enforced (the codebase is hand-formatted);
# clippy is BLOCKING (`-D warnings`): the workspace is clippy-clean (deliberate
# exceptions carry surgical per-item `#[allow]`s with rationale; `clippy.toml`
# pins the MSRV so suggestions stay compilable on the pinned toolchain), so any
# NEW warning fails the run. The release pipeline lives in release.yml.
name: ci

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      # Pin to the declared MSRV (Cargo.toml rust-version).
      - uses: dtolnay/rust-toolchain@1.85
        with:
          components: clippy

      # bindgen (ruby-prism-sys / ruby-rbs-sys) needs libclang at build time.
      - name: Install libclang (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev

      # Cache the registry + build artifacts across runs.
      - uses: Swatinem/rust-cache@v2

      # --locked: build against the committed Cargo.lock (reproducible).
      - name: Build
        run: cargo build --workspace --locked

      - name: Test
        run: cargo test --workspace --locked

      # Blocking: the workspace is clippy-clean, so `-D warnings` fails CI on any
      # new finding. `clippy.toml` pins the MSRV (1.85) so clippy never proposes
      # fixes the pinned toolchain can't compile.
      - name: Clippy
        run: cargo clippy --workspace --locked -- -D warnings

  # Snapshot-mode parity gate (ADR-0002, §14 quality-management track c).
  #
  # The differential parity gate WITHOUT the reference Ruby checkout: rigor-rs
  # is compared against committed `harness/snapshots/*.json` (the reference's
  # pinned diagnostics, regenerated locally by `harness/snapshot.rb`). This
  # enforces the zero-false-positive bar on every PR. A separate job so a
  # parity regression is distinct from a build/test failure. Needs Ruby + the
  # built binary + the snapshots — NOT the reference checkout.
  parity:
    name: snapshot parity gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.85

      # bindgen (ruby-prism-sys / ruby-rbs-sys) needs libclang at build time.
      - name: Install libclang
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev

      - uses: Swatinem/rust-cache@v2

      # Build the rigor-rs binary the snapshot gate drives (debug is fine).
      - name: Build rigor-rs
        run: cargo build --locked -p rigor-cli

      # Ruby runs the gate script; no reference checkout is involved.
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      # Snapshot-mode gate: loads harness/snapshots/*.json instead of the live
      # reference, runs the binary, fails on any unregistered false positive.
      - name: Snapshot parity gate
        run: ruby harness/run_snapshot.rb
